<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="48%" stop-color="#C8A24C"/>
      <stop offset="100%" stop-color="#8A6A2F"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0B0B0F"/>

  <!-- Eye / monitoring outline -->
  <path
    d="M8 32C14 21 23 16 32 16s18 5 24 16c-6 11-15 16-24 16S14 43 8 32Z"
    fill="none"
    stroke="url(#gold)"
    stroke-width="2"
    opacity="0.82"
  />

  <!-- Correlation graph links -->
  <g stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round" opacity="0.72">
    <line x1="32" y1="32" x2="22" y2="26"/>
    <line x1="32" y1="32" x2="43" y2="25"/>
    <line x1="32" y1="32" x2="25" y2="40"/>
    <line x1="32" y1="32" x2="44" y2="39"/>
    <line x1="22" y1="26" x2="43" y2="25" opacity="0.38"/>
    <line x1="25" y1="40" x2="44" y2="39" opacity="0.38"/>
  </g>

  <!-- Nodes -->
  <g fill="#0B0B0F" stroke="url(#gold)" stroke-width="2" filter="url(#glow)">
    <circle cx="32" cy="32" r="5.5"/>
    <circle cx="22" cy="26" r="3.2"/>
    <circle cx="43" cy="25" r="3.2"/>
    <circle cx="25" cy="40" r="3.2"/>
    <circle cx="44" cy="39" r="3.2"/>
  </g>

  <!-- Core pupil -->
  <circle cx="32" cy="32" r="2.2" fill="url(#gold)" filter="url(#glow)"/>
</svg>